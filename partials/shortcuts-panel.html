    <!-- Code Editor Shortcuts Panel -->
    <div class="shortcuts-panel" id="shortcutsPanel">
      <div class="shortcuts-title">Keyboard Shortcuts</div>
      <ul class="shortcuts-list">
        <li>
          <span>Run Code</span><span class="shortcut-key">Ctrl+Enter</span>
        </li>
        <li><span>Submit</span><span class="shortcut-key">Ctrl+S</span></li>
        <li>
          <span>Format Code</span><span class="shortcut-key">Ctrl+Shift+F</span>
        </li>
        <li>
          <span>Toggle Comment</span><span class="shortcut-key">Ctrl+/</span>
        </li>
        <li><span>Find</span><span class="shortcut-key">Ctrl+F</span></li>
        <li><span>Replace</span><span class="shortcut-key">Ctrl+H</span></li>
        <li><span>Go to Line</span><span class="shortcut-key">Ctrl+G</span></li>
        <li><span>Undo</span><span class="shortcut-key">Ctrl+Z</span></li>
        <li><span>Redo</span><span class="shortcut-key">Ctrl+Y</span></li>
      </ul>
    </div>
