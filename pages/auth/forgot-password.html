<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - Algo Infinity Verse</title>
  <link rel="stylesheet" href="/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script type="importmap">
  {
    "imports": {
      "supabase-js": "https://esm.sh/@supabase/supabase-js@2"
    }
  }
  </script>
  <script>
    (function() {
      try {
        var storedTheme = localStorage.getItem('theme');
        var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
        var theme = storedTheme || (prefersLight ? 'light' : 'dark');
        if (theme === 'light') document.documentElement.classList.add('light-mode');
        else document.documentElement.classList.remove('light-mode');
      } catch (e) {}
    })();
  </script>
</head>
<body data-page="forgot-password">
  <main class="auth-page">
    <section class="auth-panel glass-card">

      <div class="auth-brand">
        <span class="auth-mark">∞</span>
        <h1>Forgot Password</h1>
        <p>Enter your email and we'll send a reset link.</p>
      </div>

      <form class="auth-form" id="forgotPasswordForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <p class="auth-message" id="forgotMessage" aria-live="polite"></p>

        <button class="btn btn-primary auth-submit" type="submit" id="resetBtn">
          <i class="fas fa-paper-plane"></i>
          <span>Send Reset Link</span>
        </button>
      </form>

      <p class="auth-switch" style="margin-top:1.5rem;">
        Remember your password?
        <a href="/pages/auth/login.html">Back to Login</a>
      </p>

    </section>
  </main>

  <script type="module" src="/modules/supabase-auth-client.js"></script>
  <script src="/theme.js"></script>
  <script>
    const form = document.getElementById('forgotPasswordForm');
    const message = document.getElementById('forgotMessage');
    const resetBtn = document.getElementById('resetBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        message.textContent = 'Please enter a valid email address.';
        message.className = 'auth-message error';
        return;
      }

      resetBtn.disabled = true;
      resetBtn.innerHTML = '<span class="btn-spinner"></span><span>Sending...</span>';
      message.textContent = '';

      try {
        const response = await fetch('/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        // Always show success to prevent email enumeration
        message.textContent = 'If this email is registered, a reset link has been sent. Check your inbox.';
        message.className = 'auth-message success';

      } catch (err) {
        message.textContent = 'Something went wrong. Please try again.';
        message.className = 'auth-message error';
      } finally {
        resetBtn.disabled = false;
        resetBtn.innerHTML = '<i class="fas fa-paper-plane"></i><span>Send Reset Link</span>';
      }
    });
  </script>
</body>
</html>
