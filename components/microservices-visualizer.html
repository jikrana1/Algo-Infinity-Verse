<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microservices Architecture Visualizer</title>
    <link rel="stylesheet" href="microservices-visualizer.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏗️ Algo-Infinity-Verse</h1>
            <p>Microservices Architecture Visualizer</p>
        </header>

        <div class="controls">
            <button onclick="refreshServices()">🔄 Refresh</button>
            <button onclick="simulateFailure()">💥 Simulate Failure</button>
            <button onclick="scaleServices()">📈 Scale Services</button>
            <button onclick="resetServices()">🔄 Reset All</button>
        </div>

        <div class="stats">
            <div class="stat-card">
                <span class="stat-number" id="totalServices">0</span>
                <span class="stat-label">Total Services</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="healthyServices">0</span>
                <span class="stat-label">🟢 Healthy</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="degradedServices">0</span>
                <span class="stat-label">🟠 Degraded</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="unhealthyServices">0</span>
                <span class="stat-label">🔴 Unhealthy</span>
            </div>
        </div>

        <div class="visualization">
            <svg id="serviceGraph" width="100%" height="600"></svg>
        </div>

        <div class="service-grid" id="serviceGrid"></div>

        <!-- Error Log -->
        <div class="error-log" id="errorLog">
            <h3>📋 Error Log</h3>
            <div id="errorMessages"></div>
        </div>
    </div>

    <script src="microservices-visualizer.js"></script>
</body>
</html>
